# Token vault backing store.
#
# This is a minimal single-replica Redis with ephemeral storage, suitable for
# dev/eval. For production, harden it: enable AUTH (wire REDIS_PASSWORD into the
# ext_proc Secret), use a StatefulSet with a PVC, and consider enabling
# persistence/HA. Token mappings are short-lived (TOKEN_TTL) but losing them
# mid-stream means responses cannot be re-hydrated.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: promptcloak-system
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: promptcloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--maxmemory", "256mb", "--maxmemory-policy", "volatile-ttl"]
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 320Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: promptcloak-system
  labels:
    app.kubernetes.io/name: redis
spec:
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
