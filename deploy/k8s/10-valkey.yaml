# Token vault backing store (Valkey, the BSD-licensed Redis fork).
#
# promptcloak speaks the Redis wire protocol; Valkey is a drop-in. This is a
# minimal single-replica Valkey with ephemeral storage, suitable for dev/eval.
# For production, harden it: enable AUTH (wire VALKEY_PASSWORD into the ext_proc
# Secret), use a StatefulSet with a PVC, and consider persistence/HA. Token
# mappings are short-lived (TOKEN_TTL) but losing them mid-stream means
# responses cannot be re-hydrated.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: promptcloak-system
  labels:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/part-of: promptcloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: valkey
          image: valkey/valkey:8.1-alpine
          args: ["--maxmemory", "256mb", "--maxmemory-policy", "volatile-ttl"]
          ports:
            - name: valkey
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: valkey
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 320Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: promptcloak-system
  labels:
    app.kubernetes.io/name: valkey
spec:
  selector:
    app.kubernetes.io/name: valkey
  ports:
    - name: valkey
      port: 6379
      targetPort: valkey
