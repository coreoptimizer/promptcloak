# Routes gateway traffic to the LLM backend.
#
# By default this points at the in-cluster mock echo server in
# examples/mock-llm.yaml so the stack is testable without external credentials.
# To front a real provider (e.g. OpenAI), replace the backendRef with the
# Backend resource from examples/openai-backend.yaml.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm
  namespace: promptcloak-system
  labels:
    app.kubernetes.io/part-of: promptcloak
spec:
  parentRefs:
    - name: promptcloak-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mock-llm
          port: 80
