apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "promptcloak.extprocName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "promptcloak.extprocName" . }}
    {{- include "promptcloak.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "promptcloak.extprocName" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "promptcloak.extprocName" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: extproc
          image: {{ include "promptcloak.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "promptcloak.extprocName" . }}
            - secretRef:
                name: {{ include "promptcloak.extprocName" . }}
          ports:
            - name: grpc
              containerPort: 9002
            - name: health
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 10
          resources:
            {{- toYaml .Values.extproc.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "promptcloak.extprocName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "promptcloak.extprocName" . }}
    {{- include "promptcloak.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "promptcloak.extprocName" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: grpc
      port: 9002
      targetPort: grpc
      # Tell Envoy Gateway to speak HTTP/2 cleartext (h2c) to this gRPC backend.
      appProtocol: kubernetes.io/h2c
