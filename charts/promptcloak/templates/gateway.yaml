{{- if .Values.gateway.enabled }}
{{- if .Values.gateway.createClass }}
# GatewayClass is cluster-scoped. Set gateway.createClass=false to reuse an
# existing class on the cluster.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.gateway.className }}
  labels:
    {{- include "promptcloak.labels" . | nindent 4 }}
spec:
  controllerName: {{ .Values.gateway.controllerName }}
---
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "promptcloak.gatewayName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "promptcloak.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: http
      protocol: HTTP
      port: {{ .Values.gateway.port }}
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "promptcloak.fullname" . }}-llm
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "promptcloak.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "promptcloak.gatewayName" . }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        {{- if .Values.mockLlm.enabled }}
        - name: {{ include "promptcloak.mockLlmName" . }}
          port: 80
        {{- else }}
        - name: {{ required "backend.name is required when mockLlm.enabled=false and gateway.enabled=true" .Values.backend.name }}
          port: {{ .Values.backend.port }}
        {{- end }}
---
# Attaches the compliance ext_proc service to the LLM HTTPRoute.
#   request.body: Buffered  -> whole body delivered for tokenization before the
#                              model sees it (Envoy recomputes Content-Length).
#   response.body: Streamed -> chunks delivered as they arrive for re-hydration
#                              without blocking the stream (SSE-friendly).
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: {{ include "promptcloak.extprocName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "promptcloak.labels" . | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ include "promptcloak.fullname" . }}-llm
  extProc:
    - backendRefs:
        - name: {{ include "promptcloak.extprocName" . }}
          port: 9002
      messageTimeout: {{ .Values.gateway.messageTimeout }}
      processingMode:
        request:
          body: Buffered
        response:
          body: Streamed
{{- end }}
