apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "promptcloak.extprocName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "promptcloak.extprocName" . }}
    {{- include "promptcloak.labels" . | nindent 4 }}
data:
  LISTEN_ADDR: ":9002"
  HEALTH_ADDR: ":8080"
  LOG_LEVEL: {{ .Values.extproc.logLevel | quote }}
  FAIL_OPEN: {{ .Values.extproc.failOpen | quote }}
  TOKEN_TTL: {{ .Values.extproc.tokenTTL | quote }}

  DETECTOR: {{ .Values.detector | quote }}
  DETECT_LANGUAGE: {{ .Values.detect.language | quote }}
  DETECT_SCORE_THRESHOLD: {{ .Values.detect.scoreThreshold | quote }}
  DETECT_ENTITIES: {{ .Values.detect.entities | quote }}
  DETECT_TIMEOUT: {{ .Values.detect.timeout | quote }}

  {{- with (include "promptcloak.presidioURL" .) }}
  PRESIDIO_URL: {{ . | quote }}
  {{- end }}

  {{- if eq .Values.detector "gcpdlp" }}
  GCP_DLP_PROJECT: {{ required "gcpDlp.project is required when detector=gcpdlp" .Values.gcpDlp.project | quote }}
  GCP_DLP_LOCATION: {{ .Values.gcpDlp.location | quote }}
  GCP_DLP_MIN_LIKELIHOOD: {{ .Values.gcpDlp.minLikelihood | quote }}
  GCP_DLP_ENDPOINT: {{ .Values.gcpDlp.endpoint | quote }}
  {{- end }}

  {{- $addr := include "promptcloak.vaultAddr" . }}
  {{- if $addr }}
  VALKEY_ADDR: {{ $addr | quote }}
  VALKEY_DB: {{ .Values.vault.db | quote }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "promptcloak.extprocName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "promptcloak.extprocName" . }}
    {{- include "promptcloak.labels" . | nindent 4 }}
type: Opaque
stringData:
  TOKEN_SALT: {{ .Values.extproc.tokenSalt | quote }}
  {{- if not .Values.valkey.enabled }}
  VALKEY_PASSWORD: {{ .Values.vault.password | quote }}
  {{- end }}
  {{- if and (eq .Values.detector "gcpdlp") .Values.gcpDlp.token }}
  GCP_DLP_TOKEN: {{ .Values.gcpDlp.token | quote }}
  {{- end }}
