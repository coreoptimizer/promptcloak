{{- if .Values.valkey.enabled }}
# Token vault (Valkey, the BSD-licensed Redis fork). Single-replica with
# ephemeral storage; suitable for dev/eval. For production, disable this and
# point vault.addr at a hardened, persistent instance.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "promptcloak.valkeyName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "promptcloak.valkeyName" . }}
    {{- include "promptcloak.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "promptcloak.valkeyName" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "promptcloak.valkeyName" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: valkey
          image: {{ .Values.valkey.image | quote }}
          args: ["--maxmemory", "256mb", "--maxmemory-policy", "volatile-ttl"]
          ports:
            - name: valkey
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: valkey
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.valkey.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "promptcloak.valkeyName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "promptcloak.valkeyName" . }}
    {{- include "promptcloak.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "promptcloak.valkeyName" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: valkey
      port: 6379
      targetPort: valkey
{{- end }}
