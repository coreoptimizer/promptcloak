name: release

# Cuts a release when a version tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
# Publishes the multi-arch image and the Helm chart (OCI) to ghcr.io and
# creates a GitHub Release.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/extproc

jobs:
  image:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        # Strip the leading "v" -> SemVer used for both image and chart.
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  chart:
    runs-on: ubuntu-latest
    needs: image
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Package and push chart
        env:
          VERSION: ${{ needs.image.outputs.version }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "$REGISTRY" -u "${{ github.actor }}" --password-stdin
          helm package charts/promptcloak --version "$VERSION" --app-version "$VERSION" -d dist
          helm push "dist/promptcloak-${VERSION}.tgz" "oci://${REGISTRY}/${{ github.repository }}/charts"

      - uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist/*.tgz

  github-release:
    runs-on: ubuntu-latest
    needs: [image, chart]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: helm-chart
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.tgz
